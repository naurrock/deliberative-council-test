# Deliberative Council — Provider-Prioritized Model Configuration
#
# Priority order (highest to lowest):
#   0. Cloudflare Workers AI — 10K neurons/day, DAILY REGEN, 55 LLM models, HK OK
#   1. OpenRouter free models — 50 RPD, 28 free models, HK OK
#   2. Gemini — 1,500 RPD, regenerates daily (GEO-BLOCKED from HK)
#   3. Groq — ~14,400 RPD, regenerates daily (GEO-BLOCKED from HK)
#   4. SambaNova — conserve $5 credits (non-regenerating), HK OK
#   5. Cerebras — limited free tier (non-regenerating, GEO-BLOCKED)
#
# Family diversity is the core principle: each debater should use a
# model from a DIFFERENT family for genuine reasoning diversity.
#
# FAILURE TRACKING — Two-strikes escalation:
#   Strike 1: TRANSIENT (60s cooldown) — any failure (429, timeout, etc.)
#   Strike 2: DAILY (until midnight UTC) — second failure confirms exhaustion
#   No provider-specific error classification needed. The pattern speaks.
#
# GEO-BLOCKED models are filtered at selection time (never tried, never
# tracked in FailureTracker). They're listed here for completeness but
# will never be selected unless the server moves to an allowed region.
#
# CANONICAL_ID links the same underlying model across providers, so the
# selection algorithm knows that e.g. llama-3.3-70b on Cloudflare is
# the same model as llama-3.3-70b on OpenRouter (just different routes).
#
# IMPORTANT: Cloudflare models use the openai/ prefix with a custom
# api_base pointing to Cloudflare's OpenAI-compatible endpoint. This
# bypasses litellm's buggy native cloudflare handler (which uses the
# old /ai/run/ endpoint that breaks on newer model response formats).

providers:
  cloudflare:
    priority: 0
    env_key: CLOUDFLARE_API_KEY
    env_account_id: CLOUDFLARE_ACCOUNT_ID
    regenerates: true
    daily_quota: 10000       # 10K neurons/day (varies by model size)
    rpm: 50
    api_base_template: "https://api.cloudflare.com/client/v4/accounts/{CLOUDFLARE_ACCOUNT_ID}/ai/v1"
    notes: "55 LLM models. Daily regenerating neuron budget. Best ongoing free option. Uses OpenAI-compat endpoint."

  openrouter:
    priority: 1
    env_key: OPENROUTER_API_KEY
    regenerates: true
    daily_quota: 50          # 50 RPD on free tier (1,000 if $10 spent)
    rpm: 20
    notes: "28 free models with :free suffix. Good family diversity."

  gemini:
    priority: 2
    env_key: GEMINI_API_KEY
    regenerates: true
    daily_quota: 1500
    rpm: 15
    notes: "Generous free tier. GEO-BLOCKED from HK server."
    geo_blocked: true

  groq:
    priority: 3
    env_key: GROQ_API_KEY
    regenerates: true
    daily_quota: 14400
    rpm: 30
    notes: "Fastest inference (LPU hardware). GEO-BLOCKED from HK server."
    geo_blocked: true

  sambanova:
    priority: 4
    env_key: SAMBANOVA_API_KEY
    regenerates: false
    credit_remaining: 5.00   # USD, non-regenerating
    notes: "$5 signup credits. Conserve for later testing."

  cerebras:
    priority: 5
    env_key: CEREBRAS_API_KEY
    regenerates: false
    credit_remaining: 0.00
    notes: "Very limited free tier. GEO-BLOCKED from HK server."
    geo_blocked: true

# ── Model Registry ────────────────────────────────────────────────────────
#
# Cloudflare models use `openai/` prefix with api_base pointing to CF's
# OpenAI-compatible /ai/v1 endpoint. This works around litellm's broken
# native cloudflare handler (which hits /ai/run/ and expects old response
# format). The CF API key goes in api_key field.
#
# Model IDs use the pattern: openai/@cf/<org>/<model-name>
# The api_base resolves to:  https://api.cloudflare.com/client/v4/accounts/{ID}/ai/v1
