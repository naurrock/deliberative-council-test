# ── Fallback Chains ─────────────────────────────────────────────────────
# Ordered lists of model IDs to try when the primary model fails.
# Geo-blocked models are listed for documentation but will be skipped
# by resolve_fallback() — they'll never actually be tried.
#
# With two-strikes escalation, a model that fails twice gets marked
# DAILY (until midnight). The fallback chain then moves on.

